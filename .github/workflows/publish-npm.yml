name: Publish npm

# Trusted Publisher (OIDC) requirements on npmjs.com → package → Trusted Publisher:
#   Organization/user : league-fan
#   Repository        : league-fan-assets
#   Workflow filename : publish-npm.yml   (exact name, no path)
#   Environment       : (leave empty unless you set one below)
# Do NOT set NODE_AUTH_TOKEN — it overrides OIDC and causes E404.
# Needs npm >= 11.5.1

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publisher OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Bundled npm on Node 22 may be too old for trusted publishing
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest && npm --version

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm (OIDC)
        # No NODE_AUTH_TOKEN / NPM_TOKEN — OIDC only
        run: npm publish --access public --provenance
